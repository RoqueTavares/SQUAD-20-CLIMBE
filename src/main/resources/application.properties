spring.application.name=sistema_climbe
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/user_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# CORS — origens permitidas (separadas por vírgula; vazio = nenhuma)
cors.allowed-origins=

# JWT (sobrescrever via variável de ambiente em produção)
jwt.secret=NDBONDYzNTI2NjU1NkE1ODZFMzI3MjM1NzUzODc4MkY0MTNGNDQyODQ3MkI0QjYyNTA2NDUzNjc1NjZCNTk3MA==
jwt.expiration-ms=86400000

# Swagger / OpenAPI (SpringDoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
